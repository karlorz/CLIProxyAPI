services:
  cli-proxy-api:
    image: 'karlorz/cli-proxy-api:latest'
    environment:
      - DEPLOY=${DEPLOY:-}
      - SERVICE_FQDN_CLIPROXYAPI_8317
    ports:
      - "8317:8317"
      - "8085:8085"
      - "1455:1455"
      - "54545:54545"
      - "51121:51121"
      - "11451:11451"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8317/healthz >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    volumes:
      - './config.yaml:/CLIProxyAPI/config.yaml'
      - './auths:/root/.cli-proxy-api'
      - './logs:/CLIProxyAPI/logs'
networks:
  aigateway:
    name: aigateway
    external: true
