services:
  cli-proxy-api:
    image: 'karlorz/cli-proxy-api:latest'
    environment:
      - DEPLOY=${DEPLOY:-}
      - SERVICE_FQDN_CLIPROXYAPI_8317
    ports:
      - "8317:8317"
      - "8085:8085"
      - "1455:1455"
      - "54545:54545"
      - "51121:51121"
      - "11451:11451"
    volumes:
      - 'cli-proxy-config:/CLIProxyAPI/config.yaml'
      - 'cli-proxy-auths:/root/.cli-proxy-api'
      - 'cli-proxy-logs:/CLIProxyAPI/logs'
volumes:
  cli-proxy-config:
  cli-proxy-auths:
  cli-proxy-logs:
