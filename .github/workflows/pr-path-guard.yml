name: translator-path-guard

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  ensure-no-translator-changes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect internal/translator changes
        id: translator-files
        uses: tj-actions/changed-files@v45
        with:
          files: |
            internal/translator/**
      - name: Detect non-translator changes
        id: non-translator-files
        uses: tj-actions/changed-files@v45
        with:
          files_ignore: |
            internal/translator/**
      - name: Fail when the PR changes only restricted paths
        if: steps.translator-files.outputs.any_changed == 'true' && steps.non-translator-files.outputs.any_changed != 'true'
        run: |
          echo "Standalone pull requests that change only internal/translator are not allowed."
          echo "Translator changes must be part of a broader change elsewhere in the repository."
          exit 1
